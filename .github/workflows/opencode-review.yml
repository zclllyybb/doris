name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read

jobs:
  code-review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check automated review decision for current PR head
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          REVIEWS=$(gh api repos/${REPO}/pulls/${PR_NUMBER}/reviews)
          review_state=$(printf '%s' "$REVIEWS" | jq -r --arg head_sha "$HEAD_SHA" '
            [ .[]
              | select(.user.login == "github-actions[bot]")
              | select(.commit_id == $head_sha)
              | select(.state == "APPROVED" or .state == "CHANGES_REQUESTED")
            ]
            | sort_by(.submitted_at)
            | last
            | .state // ""
          ')

          if [ "$review_state" = "APPROVED" ]; then
            echo "Found APPROVED automated review for ${HEAD_SHA}."
            exit 0
          fi

          if [ "$review_state" = "CHANGES_REQUESTED" ]; then
            echo "Automated review requested changes for ${HEAD_SHA}."
            exit 1
          fi

          echo "No automated approve/request-changes review exists for ${HEAD_SHA}. Trigger /review first."
          exit 1
