name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read
  statuses: write

jobs:
  sync-status:
    name: Sync review status
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check automated review decision for current PR head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          COMMENTS=$(gh api repos/${REPO}/issues/${PR_NUMBER}/comments)
          review_state=$(printf '%s' "$COMMENTS" | jq -r --arg head_sha "$HEAD_SHA" '
            ([ .[]
              | select(.user.login == "github-actions[bot]")
              | select((.body // "") | contains("<!-- opencode-review-result -->"))
              | select((.body // "") | contains("HEAD_SHA: " + $head_sha))
            ]
            | sort_by(.created_at)
            | last) as $comment
            | if $comment == null then ""
              elif ($comment.body // "") | contains("DECISION: APPROVE") then "APPROVED"
              elif ($comment.body // "") | contains("DECISION: REQUEST_CHANGES") then "CHANGES_REQUESTED"
              else ""
              end
          ')

          state="pending"
          summary="Trigger /review to start automated review for ${HEAD_SHA}."

          if [ "$review_state" = "APPROVED" ]; then
            state="success"
            summary="Automated review approved the PR for ${HEAD_SHA}."
          elif [ "$review_state" = "CHANGES_REQUESTED" ]; then
            state="failure"
            summary="Automated review requested changes for ${HEAD_SHA}."
          fi

          gh api repos/${REPO}/statuses/${HEAD_SHA} \
            -X POST \
            -f state="${state}" \
            -f context='code-review' \
            -f description="${summary}" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
